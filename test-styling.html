<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Styling Check</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Poppins', sans-serif;
            padding: 50px;
            text-align: center;
        }
        .test-box {
            background: #0a0a0a;
            padding: 40px;
            border: 2px solid #f43f5e;
            border-radius: 20px;
            margin: 20px auto;
            max-width: 600px;
        }
        h1 {
            color: #f43f5e;
        }
    </style>
</head>
<body>
    <div class="test-box">
        <h1>Background Test</h1>
        <p>If you see this with a dark background (#0a0a0a), the styling is working!</p>
        <p>Background color: #0a0a0a</p>
        <p>Text color: #e5e5e5</p>
    </div>
</body>
</html>
