<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recz - Group Flow</title>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --noise-bg: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Poppins', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        ::-webkit-scrollbar { display: none; }

        .page {
            display: flex;
            flex-direction: column;
            gap: 56px;
            padding: 32px 48px 56px;
        }
        .theme-row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: center;
            gap: 56px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .screen-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .screen-label {
            color: #525252;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .iphone-frame {
            width: 375px;
            min-height: 812px;
            height: max-content;
            border-radius: 3.5rem;
            border-width: 6px;
            border-style: solid;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .iphone-frame.tall { min-height: 1065px; }
        
        .iphone-frame.phone-dark {
            border-color: #1c1c1e;
            background-color: #030303;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), inset 0 0 0 2px rgba(255, 255, 255, 0.08);
        }

        .iphone-frame.phone-light {
            border-color: #d8d8d8;
            background-color: #f3f3f3;
            background-image: var(--noise-bg);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), inset 0 0 0 2px rgba(255, 255, 255, 0.5);
        }

        .phone-dark {
            color: #fff;
            --page-bg: #030303;
            --panel: rgba(255, 255, 255, 0.03);
            --panel-strong: rgba(255, 255, 255, 0.055);
            --panel-soft: rgba(255, 255, 255, 0.025);
            --line: rgba(255, 255, 255, 0.08);
            --text: #fff;
            --muted: #a3a3a3;
            --faint: #737373;
            --input: rgba(0, 0, 0, 0.2);
            --shadow: rgba(0, 0, 0, 0.5);
        }
        .phone-light {
            color: #171717;
            --page-bg: #f3f3f3;
            --panel: rgba(255, 255, 255, 0.7);
            --panel-strong: rgba(255, 255, 255, 0.82);
            --panel-soft: rgba(255, 255, 255, 0.58);
            --line: rgba(0, 0, 0, 0.08);
            --text: #171717;
            --muted: #737373;
            --faint: #a3a3a3;
            --input: rgba(255, 255, 255, 0.6);
            --shadow: rgba(0, 0, 0, 0.12);
        }
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            width: 140px;
            height: 32px;
            transform: translateX(-50%);
            background-color: #1c1c1e;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 50;
        }
        .phone-light .notch {
            background-color: #d8d8d8;
        }
        .aura {
            position: absolute;
            pointer-events: none;
            width: 300px;
            height: 300px;
            top: -92px;
            right: -118px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.3) 0%, rgba(168, 85, 247, 0.2) 38%, rgba(0, 0, 0, 0) 70%);
            filter: blur(80px);
            z-index: 0;
        }
        .phone-light .aura {
            opacity: 0.65;
        }
        .status {
            height: 44px;
            padding: 13px 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 5;
            font-size: 11px;
            font-weight: 500;
            color: var(--text);
        }
        .status-icons {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
        }
        .topbar {
            height: 56px;
            padding: 0 18px;
            display: grid;
            grid-template-columns: 44px 1fr 44px;
            align-items: center;
            position: relative;
            z-index: 5;
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
        }
        .phone-dark .topbar {
            background: rgba(5, 5, 5, 0.65);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .phone-light .topbar {
            background-color: rgba(243, 243, 243, 0.85);
            background-image: var(--noise-bg);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        .topbar-title {
            text-align: center;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .topbar-action {
            justify-self: end;
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
        }
        .icon-button {
            width: 40px;
            height: 40px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--text);
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font: inherit;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .phone-dark .icon-button {
            background: rgba(255, 255, 255, 0.03);
            border-top-color: rgba(255, 255, 255, 0.12);
        }
        .phone-light .icon-button {
            background-color: rgba(255, 255, 255, 0.5);
            background-image: var(--noise-bg);
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        .glass,
        .group-list-item,
        .cover-large,
        .cover-option,
        .empty-illustration,
        .sheet-group {
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
        }

        .phone-dark .glass,
        .phone-dark .group-list-item,
        .phone-dark .cover-large,
        .phone-dark .cover-option,
        .phone-dark .empty-illustration,
        .phone-dark .sheet-group {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top-color: rgba(255, 255, 255, 0.2);
            border-left-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .phone-light .glass,
        .phone-light .group-list-item,
        .phone-light .cover-large,
        .phone-light .cover-option,
        .phone-light .empty-illustration,
        .phone-light .sheet-group {
            background: var(--noise-bg), linear-gradient(135deg, rgba(255, 255, 255, 0.72) 0%, rgba(255, 255, 255, 0.45) 100%);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-top-color: rgba(255, 255, 255, 0.85);
            border-left-color: rgba(255, 255, 255, 0.65);
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.12),
                        inset 0 1px 0 rgba(255, 255, 255, 0.95),
                        inset 0 -1px 0 rgba(0, 0, 0, 0.04),
                        0 8px 32px rgba(244, 63, 94, 0.06);
        }
        .content {
            position: relative;
            z-index: 2;
            flex: 1;
            overflow-y: auto;
            padding: 18px 20px 112px;
        }
        .content.no-bottom { padding-bottom: 18px; }
        .content.form { padding-top: 22px; }
        .bottom-fixed {
            position: absolute;
            left: 24px;
            right: 24px;
            bottom: 28px;
            z-index: 7;
        }
        .primary-btn,
        .small-btn {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: linear-gradient(135deg, #f43f5e 0%, #db2777 100%);
            box-shadow: 0 8px 24px -6px rgba(244, 63, 94, 0.5);
            font-weight: 400;
            color: white;
            font-family: inherit;
        }
        .primary-btn {
            width: 100%;
            height: 50px;
            border-radius: 1rem;
            font-size: 14px;
        }
        .small-btn {
            height: 32px;
            border-radius: 0.8rem;
            font-size: 10px;
            font-weight: 600;
        }
        .main-tabs {
            margin: 8px 18px 0;
            padding: 5px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            border-radius: 999px;
            position: relative;
            z-index: 5;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .phone-dark .main-tabs {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 44px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .phone-light .main-tabs {
            background-color: rgba(255, 255, 255, 0.7);
            background-image: var(--noise-bg);
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 10px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.95);
        }
        .main-tabs button,
        .mini-tabs button {
            border: 0;
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-weight: 500;
            border-radius: 999px;
        }
        .main-tabs button {
            height: 40px;
            font-size: 13px;
        }
        .main-tabs button.active {
            color: #fff;
            background: linear-gradient(135deg, #f43f5e, #db2777);
            box-shadow: 0 8px 24px rgba(244, 63, 94, 0.4);
        }
        .mini-tabs {
            height: 44px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: end;
            padding: 0 22px;
            border-bottom: 1px solid var(--line);
            background: var(--page-bg);
        }
        .phone-light .mini-tabs {
            background-image: var(--noise-bg);
        }
        .mini-tabs button {
            height: 38px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 0;
            border-bottom: 2px solid transparent;
        }
        .mini-tabs button.active {
            color: #f43f5e;
            border-bottom-color: #f43f5e;
        }
        .search,
        .input,
        .select,
        .textarea {
            border-radius: 1rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--line);
            color: var(--muted);
            font-family: inherit;
            font-size: 12px;
        }
        .phone-dark .search,
        .phone-dark .input,
        .phone-dark .select,
        .phone-dark .textarea {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
        }
        .phone-light .search,
        .phone-light .input,
        .phone-light .select,
        .phone-light .textarea {
            background-color: rgba(255, 255, 255, 0.6);
            background-image: var(--noise-bg);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.06), 0 4px 12px rgba(0, 0, 0, 0.04);
        }
        .search {
            height: 44px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 9px;
            color: var(--faint);
            font-size: 12px;
        }
        .input,
        .select { 
            height: 44px; 
            padding: 0 12px; 
        }
        .textarea { 
            height: 150px; 
            padding: 12px; 
            resize: none; 
        }
        .section-title {
            margin: 18px 0 10px;
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .group-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .group-card {
            overflow: hidden;
            border-radius: 1.5rem;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .group-art {
            height: 92px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.05;
            background: linear-gradient(135deg, #10b981, #0891b2);
        }
        .group-art.smile {
            color: #7f1d1d;
            background:
                linear-gradient(rgba(255,255,255,0.36), rgba(255,255,255,0.22)),
                linear-gradient(135deg, #f5d0a9, #fecdd3);
            font-family: cursive;
            font-size: 20px;
        }
        .group-card-body {
            padding: 12px;
            background: transparent;
            border-top: 1px solid var(--line);
        }
        .card-title {
            margin: 0 0 4px;
            color: var(--text);
            font-size: 12px;
            font-weight: 700;
        }
        .card-meta {
            color: var(--muted);
            font-size: 10px;
            line-height: 1.35;
        }
        .group-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .group-list-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-radius: 1.5rem;
        }
        .thumb,
        .cover-large,
        .cover-option,
        .movie-card {
            border-radius: 1.25rem;
        }
        .thumb {
            width: 74px;
            height: 58px;
            flex: 0 0 auto;
            background: linear-gradient(135deg, #f59e0b, #14b8a6);
            overflow: hidden;
        }
        .thumb.clean { background: linear-gradient(135deg, #0f766e, #fde68a); }
        .thumb.family { background: linear-gradient(135deg, #f97316, #f43f5e); }
        .thumb.cover { background-image: url('Invite.svg'); background-size: cover; background-position: center; }
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            margin-bottom: 7px;
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
        }
        .invite-link {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0 18px;
        }
        .round-pink {
            width: 42px;
            height: 42px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            background: linear-gradient(135deg, #f43f5e, #db2777);
        }
        .person-row {
            min-height: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--line);
        }
        .helper {
            color: var(--muted);
            font-size: 11px;
            line-height: 1.5;
        }
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            flex: 0 0 auto;
            background-size: cover;
            background-position: center;
            border-width: 2px;
            border-color: var(--page-bg);
            box-shadow: 0 4px 14px var(--shadow);
        }
        .round-pink,
        .nav-add,
        .floating-recz {
            background: linear-gradient(135deg, #f43f5e 0%, #db2777 100%);
            box-shadow: 0 8px 24px rgba(244, 63, 94, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .person-main {
            flex: 1;
            min-width: 0;
        }
        .person-name {
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
        }
        .person-role {
            color: var(--muted);
            font-size: 10px;
            margin-top: 2px;
        }
        .text-link {
            color: #3b82f6;
            font-size: 11px;
            font-weight: 500;
        }
        .remove-link { color: #f43f5e; }
        .cover-large {
            height: 168px;
            border-radius: 10px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cover-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cover-options {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        .cover-option {
            width: 54px;
            height: 54px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            color: var(--text);
            overflow: hidden;
        }
        .cover-caption {
            margin-top: 6px;
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
        }
        .wall-cover {
            height: 188px;
            position: relative;
            background:
                linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.55)),
                linear-gradient(135deg, #0f766e, #f59e0b 52%, #60a5fa);
        }
        .wall-cover.special {
            background:
                linear-gradient(180deg, rgba(0,0,0,0.14), rgba(0,0,0,0.58)),
                linear-gradient(135deg, #164e63, #f59e0b, #f43f5e);
        }
        .wall-info,
        .wall-tabs {
            background-color: var(--page-bg);
        }
        .phone-light .wall-info,
        .phone-light .wall-tabs {
            background-image: var(--noise-bg);
        }
        .wall-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px 20px 118px;
        }
        .post-card,
        .empty-illustration {
            border-radius: 2rem;
        }
        .category-grid {
            gap: 14px;
        }
        .category-tile {
            height: 86px;
            border-radius: 1.5rem;
        }
        .category-tile iconify-icon {
            font-size: 28px;
        }
        .wall-actions {
            position: absolute;
            left: 14px;
            right: 14px;
            top: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
        }
        .wall-actions .icon-button,
        .edit-chip {
            background: rgba(255,255,255,0.72);
            color: #171717;
            box-shadow: 0 8px 18px rgba(0,0,0,0.16);
        }
        .wall-actions-right {
            display: flex;
            gap: 8px;
        }
        .edit-chip {
            position: absolute;
            right: 16px;
            bottom: 12px;
            height: 28px;
            padding: 0 10px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .wall-info {
            padding: 14px 18px 10px;
            border-bottom: 1px solid var(--line);
            background: var(--page-bg);
        }
        .wall-info h2 {
            margin: 0 0 4px;
            color: var(--text);
            font-size: 18px;
            font-weight: 700;
        }
        .wall-info-meta {
            display: flex;
            gap: 14px;
            color: var(--muted);
            font-size: 11px;
        }
        .wall-tabs {
            height: 38px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 1px solid var(--line);
            background: var(--page-bg);
        }
        .wall-tabs.three { grid-template-columns: repeat(3, 1fr); }
        .wall-tabs span {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
        }
        .wall-tabs span.active {
            color: #f43f5e;
            border-bottom-color: #f43f5e;
        }
        .wall-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px 84px;
        }
        .empty-rec {
            min-height: 370px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 14px;
        }
        .empty-illustration {
            width: 180px;
            height: 128px;
            border-radius: 24px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f43f5e;
            font-size: 52px;
        }
        .post-card {
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 14px;
        }
        .post-head {
            display: flex;
            gap: 9px;
            padding: 12px;
            align-items: center;
        }
        .post-copy {
            padding: 0 12px 12px;
            color: var(--text);
            font-size: 11px;
            line-height: 1.5;
        }
        .ask-card {
            height: 156px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #f43f5e;
            background: linear-gradient(135deg, rgba(244,63,94,0.10), rgba(244,63,94,0.02));
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }
        .movie-row {
            display: flex;
            gap: 10px;
            padding: 0 12px 12px;
        }
        .movie-card {
            width: 86px;
            height: 126px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            flex: 0 0 auto;
            background: linear-gradient(135deg, #111827, #ef4444);
            color: #fff;
            display: flex;
            align-items: flex-end;
            padding: 7px;
            font-size: 9px;

                        ${field('Group description', 'Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam.', 'textarea')}
                    </div>
                    <div class="bottom-fixed"><button class="primary-btn">Submit</button></div>`
            },
            {
                name: 'Group Participants',
                html: () => `
                    ${statusBar()}
                    ${peopleModal('Group Participants', 'Select')}`
            }
        ];

        function renderScreen(screen, theme) {
            const themeClass = theme === 'dark' ? 'phone-dark' : 'phone-light';
            return `
                <div class="screen-wrap">
                    <div class="screen-label">${screen.name} - ${theme}</div>
                    <div class="iphone-frame ${themeClass} ${screen.tall ? 'tall' : ''}">
                        <div class="notch"></div>
                        <div class="aura"></div>
                        ${screen.html(theme)}
                    </div>
                </div>`;
        }

        const root = document.getElementById('screens');
        root.innerHTML = `
            <section class="theme-row">${screens.map(screen => renderScreen(screen, 'dark')).join('')}</section>
            <section class="theme-row">${screens.map(screen => renderScreen(screen, 'light')).join('')}</section>
        `;
    </script>
</body>
</html>
